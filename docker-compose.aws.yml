services:
  backend:
    build:
      context: ./backend
    container_name: ai-hiring-os-backend
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: production
      DEBUG: "false"
      PORT: "8000"
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
