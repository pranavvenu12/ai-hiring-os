services:
  - type: web
    name: ai-hiring-os-backend
    env: python
    buildCommand: "export PYTHON_VERSION=3.12.1 && export PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1 && pip install -r backend/requirements.txt"
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: false
      - key: PYTHON_VERSION
        value: 3.12.1
      - key: PYO3_USE_ABI3_FORWARD_COMPATIBILITY
        value: "1"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
